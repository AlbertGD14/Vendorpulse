groups:
- interval: 2m30s
  name: payments-sla-availability-increase
  rules:
  - expr: sum by (status) (increase(http_requests_total{service="payments"}[30d]))
    labels:
      service: payments
      slo: payments-sla-availability
    record: http_requests:increase30d
  - alert: SLOMetricAbsent
    expr: absent(http_requests_total{service="payments"}) == 1
    for: 6m
    labels:
      service: payments
      severity: critical
      slo: payments-sla-availability
- interval: 30s
  name: payments-sla-availability
  rules:
  - expr: sum(rate(http_requests_total{service="payments",status="500"}[5m])) / sum(rate(http_requests_total{service="payments"}[5m]))
    labels:
      service: payments
      slo: payments-sla-availability
    record: http_requests:burnrate5m
  - expr: sum(rate(http_requests_total{service="payments",status="500"}[32m])) / sum(rate(http_requests_total{service="payments"}[32m]))
    labels:
      service: payments
      slo: payments-sla-availability
    record: http_requests:burnrate32m
  - expr: sum(rate(http_requests_total{service="payments",status="500"}[1h4m])) /
      sum(rate(http_requests_total{service="payments"}[1h4m]))
    labels:
      service: payments
      slo: payments-sla-availability
    record: http_requests:burnrate1h4m
  - expr: sum(rate(http_requests_total{service="payments",status="500"}[2h9m])) /
      sum(rate(http_requests_total{service="payments"}[2h9m]))
    labels:
      service: payments
      slo: payments-sla-availability
    record: http_requests:burnrate2h9m
  - expr: sum(rate(http_requests_total{service="payments",status="500"}[6h26m])) /
      sum(rate(http_requests_total{service="payments"}[6h26m]))
    labels:
      service: payments
      slo: payments-sla-availability
    record: http_requests:burnrate6h26m
  - expr: sum(rate(http_requests_total{service="payments",status="500"}[1d1h43m]))
      / sum(rate(http_requests_total{service="payments"}[1d1h43m]))
    labels:
      service: payments
      slo: payments-sla-availability
    record: http_requests:burnrate1d1h43m
  - expr: sum(rate(http_requests_total{service="payments",status="500"}[4d6h51m]))
      / sum(rate(http_requests_total{service="payments"}[4d6h51m]))
    labels:
      service: payments
      slo: payments-sla-availability
    record: http_requests:burnrate4d6h51m
  - alert: ErrorBudgetBurn
    expr: http_requests:burnrate5m{service="payments",slo="payments-sla-availability"}
      > (14 * (1-0.995)) and http_requests:burnrate1h4m{service="payments",slo="payments-sla-availability"}
      > (14 * (1-0.995))
    for: 2m0s
    labels:
      exhaustion: 2d3h25m42s
      long: 1h4m
      service: payments
      severity: critical
      short: 5m
      slo: payments-sla-availability
  - alert: ErrorBudgetBurn
    expr: http_requests:burnrate32m{service="payments",slo="payments-sla-availability"}
      > (7 * (1-0.995)) and http_requests:burnrate6h26m{service="payments",slo="payments-sla-availability"}
      > (7 * (1-0.995))
    for: 16m0s
    labels:
      exhaustion: 4d6h51m25s
      long: 6h26m
      service: payments
      severity: critical
      short: 32m
      slo: payments-sla-availability
  - alert: ErrorBudgetBurn
    expr: http_requests:burnrate2h9m{service="payments",slo="payments-sla-availability"}
      > (2 * (1-0.995)) and http_requests:burnrate1d1h43m{service="payments",slo="payments-sla-availability"}
      > (2 * (1-0.995))
    for: 1h4m0s
    labels:
      exhaustion: 15d
      long: 1d1h43m
      service: payments
      severity: warning
      short: 2h9m
      slo: payments-sla-availability
  - alert: ErrorBudgetBurn
    expr: http_requests:burnrate6h26m{service="payments",slo="payments-sla-availability"}
      > (1 * (1-0.995)) and http_requests:burnrate4d6h51m{service="payments",slo="payments-sla-availability"}
      > (1 * (1-0.995))
    for: 3h13m0s
    labels:
      exhaustion: 30d
      long: 4d6h51m
      service: payments
      severity: warning
      short: 6h26m
      slo: payments-sla-availability
- interval: 30s
  name: payments-sla-availability-generic
  rules:
  - expr: "0.995"
    labels:
      slo: payments-sla-availability
    record: pyrra_objective
  - expr: "2592000"
    labels:
      slo: payments-sla-availability
    record: pyrra_window
  - expr: 1 - sum(http_requests:increase30d{service="payments",slo="payments-sla-availability",status="500"}
      or vector(0)) / sum(http_requests:increase30d{service="payments",slo="payments-sla-availability"})
    labels:
      slo: payments-sla-availability
    record: pyrra_availability
  - expr: sum(rate(http_requests_total{service="payments"}[5m]))
    labels:
      slo: payments-sla-availability
    record: pyrra_requests:rate5m
  - expr: sum(rate(http_requests_total{service="payments",status="500"}[5m])) or vector(0)
    labels:
      slo: payments-sla-availability
    record: pyrra_errors:rate5m

groups:
- interval: 30s
  name: elastic-latency-increase
  rules:
  - expr: sum(increase(sli_checks_total{check="latency",service="elastic"}[1h]))
    labels:
      check: latency
      service: elastic
      slo: elastic-latency
    record: sli_checks:increase1h
  - alert: SLOMetricAbsent
    expr: absent(sli_checks_total{check="latency",service="elastic"}) == 1
    for: 0s
    labels:
      check: latency
      service: elastic
      severity: critical
      slo: elastic-latency
  - expr: sum(increase(sli_errors_total{check="latency",service="elastic"}[1h]))
    labels:
      check: latency
      service: elastic
      slo: elastic-latency
    record: sli_errors:increase1h
  - alert: SLOMetricAbsent
    expr: absent(sli_errors_total{check="latency",service="elastic"}) == 1
    for: 0s
    labels:
      check: latency
      service: elastic
      severity: critical
      slo: elastic-latency
- interval: 30s
  name: elastic-latency
  rules:
  - expr: sum(rate(sli_errors_total{check="latency",service="elastic"}[1s])) / sum(rate(sli_checks_total{check="latency",service="elastic"}[1s]))
    labels:
      check: latency
      service: elastic
      slo: elastic-latency
    record: sli_checks:burnrate0s
  - expr: sum(rate(sli_errors_total{check="latency",service="elastic"}[1m])) / sum(rate(sli_checks_total{check="latency",service="elastic"}[1m]))
    labels:
      check: latency
      service: elastic
      slo: elastic-latency
    record: sli_checks:burnrate1m
  - expr: sum(rate(sli_errors_total{check="latency",service="elastic"}[2m])) / sum(rate(sli_checks_total{check="latency",service="elastic"}[2m]))
    labels:
      check: latency
      service: elastic
      slo: elastic-latency
    record: sli_checks:burnrate2m
  - expr: sum(rate(sli_errors_total{check="latency",service="elastic"}[9m])) / sum(rate(sli_checks_total{check="latency",service="elastic"}[9m]))
    labels:
      check: latency
      service: elastic
      slo: elastic-latency
    record: sli_checks:burnrate9m
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate0s{check="latency",service="elastic",slo="elastic-latency"}
      > (14 * (1-0.99)) and sli_checks:burnrate0s{check="latency",service="elastic",slo="elastic-latency"}
      > (14 * (1-0.99))
    for: 0s
    labels:
      check: latency
      exhaustion: 4m17s
      long: 0s
      service: elastic
      severity: critical
      short: 0s
      slo: elastic-latency
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate0s{check="latency",service="elastic",slo="elastic-latency"}
      > (7 * (1-0.99)) and sli_checks:burnrate1m{check="latency",service="elastic",slo="elastic-latency"}
      > (7 * (1-0.99))
    for: 0s
    labels:
      check: latency
      exhaustion: 8m34s
      long: 1m
      service: elastic
      severity: critical
      short: 0s
      slo: elastic-latency
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate0s{check="latency",service="elastic",slo="elastic-latency"}
      > (2 * (1-0.99)) and sli_checks:burnrate2m{check="latency",service="elastic",slo="elastic-latency"}
      > (2 * (1-0.99))
    for: 0s
    labels:
      check: latency
      exhaustion: 30m
      long: 2m
      service: elastic
      severity: warning
      short: 0s
      slo: elastic-latency
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate1m{check="latency",service="elastic",slo="elastic-latency"}
      > (1 * (1-0.99)) and sli_checks:burnrate9m{check="latency",service="elastic",slo="elastic-latency"}
      > (1 * (1-0.99))
    for: 0s
    labels:
      check: latency
      exhaustion: 1h
      long: 9m
      service: elastic
      severity: warning
      short: 1m
      slo: elastic-latency
- interval: 30s
  name: elastic-latency-generic
  rules:
  - expr: "0.99"
    labels:
      slo: elastic-latency
    record: pyrra_objective
  - expr: "3600"
    labels:
      slo: elastic-latency
    record: pyrra_window
  - expr: 1 - sum(sli_errors:increase1h{check="latency",service="elastic",slo="elastic-latency"}
      or vector(0)) / sum(sli_checks:increase1h{check="latency",service="elastic",slo="elastic-latency"})
    labels:
      slo: elastic-latency
    record: pyrra_availability
  - expr: sum(rate(sli_checks_total{check="latency",service="elastic"}[5m]))
    labels:
      slo: elastic-latency
    record: pyrra_requests:rate5m
  - expr: sum(rate(sli_errors_total{check="latency",service="elastic"}[5m])) or vector(0)
    labels:
      slo: elastic-latency
    record: pyrra_errors:rate5m

groups:
- interval: 2m30s
  name: qr-detector-sla-quality-increase
  rules:
  - expr: sum(increase(sli_checks_total{check="quality",service="qr-detector"}[30d]))
    labels:
      check: quality
      service: qr-detector
      slo: qr-detector-sla-quality
    record: sli_checks:increase30d
  - alert: SLOMetricAbsent
    expr: absent(sli_checks_total{check="quality",service="qr-detector"}) == 1
    for: 47m
    labels:
      check: quality
      service: qr-detector
      severity: critical
      slo: qr-detector-sla-quality
  - expr: sum(increase(sli_errors_total{check="quality",service="qr-detector"}[30d]))
    labels:
      check: quality
      service: qr-detector
      slo: qr-detector-sla-quality
    record: sli_errors:increase30d
  - alert: SLOMetricAbsent
    expr: absent(sli_errors_total{check="quality",service="qr-detector"}) == 1
    for: 47m
    labels:
      check: quality
      service: qr-detector
      severity: critical
      slo: qr-detector-sla-quality
- interval: 30s
  name: qr-detector-sla-quality
  rules:
  - expr: sum(rate(sli_errors_total{check="quality",service="qr-detector"}[5m])) /
      sum(rate(sli_checks_total{check="quality",service="qr-detector"}[5m]))
    labels:
      check: quality
      service: qr-detector
      slo: qr-detector-sla-quality
    record: sli_checks:burnrate5m
  - expr: sum(rate(sli_errors_total{check="quality",service="qr-detector"}[32m]))
      / sum(rate(sli_checks_total{check="quality",service="qr-detector"}[32m]))
    labels:
      check: quality
      service: qr-detector
      slo: qr-detector-sla-quality
    record: sli_checks:burnrate32m
  - expr: sum(rate(sli_errors_total{check="quality",service="qr-detector"}[1h4m]))
      / sum(rate(sli_checks_total{check="quality",service="qr-detector"}[1h4m]))
    labels:
      check: quality
      service: qr-detector
      slo: qr-detector-sla-quality
    record: sli_checks:burnrate1h4m
  - expr: sum(rate(sli_errors_total{check="quality",service="qr-detector"}[2h9m]))
      / sum(rate(sli_checks_total{check="quality",service="qr-detector"}[2h9m]))
    labels:
      check: quality
      service: qr-detector
      slo: qr-detector-sla-quality
    record: sli_checks:burnrate2h9m
  - expr: sum(rate(sli_errors_total{check="quality",service="qr-detector"}[6h26m]))
      / sum(rate(sli_checks_total{check="quality",service="qr-detector"}[6h26m]))
    labels:
      check: quality
      service: qr-detector
      slo: qr-detector-sla-quality
    record: sli_checks:burnrate6h26m
  - expr: sum(rate(sli_errors_total{check="quality",service="qr-detector"}[1d1h43m]))
      / sum(rate(sli_checks_total{check="quality",service="qr-detector"}[1d1h43m]))
    labels:
      check: quality
      service: qr-detector
      slo: qr-detector-sla-quality
    record: sli_checks:burnrate1d1h43m
  - expr: sum(rate(sli_errors_total{check="quality",service="qr-detector"}[4d6h51m]))
      / sum(rate(sli_checks_total{check="quality",service="qr-detector"}[4d6h51m]))
    labels:
      check: quality
      service: qr-detector
      slo: qr-detector-sla-quality
    record: sli_checks:burnrate4d6h51m
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate5m{check="quality",service="qr-detector",slo="qr-detector-sla-quality"}
      > (14 * (1-0.95)) and sli_checks:burnrate1h4m{check="quality",service="qr-detector",slo="qr-detector-sla-quality"}
      > (14 * (1-0.95))
    for: 2m0s
    labels:
      check: quality
      exhaustion: 2d3h25m42s
      long: 1h4m
      service: qr-detector
      severity: critical
      short: 5m
      slo: qr-detector-sla-quality
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate32m{check="quality",service="qr-detector",slo="qr-detector-sla-quality"}
      > (7 * (1-0.95)) and sli_checks:burnrate6h26m{check="quality",service="qr-detector",slo="qr-detector-sla-quality"}
      > (7 * (1-0.95))
    for: 16m0s
    labels:
      check: quality
      exhaustion: 4d6h51m25s
      long: 6h26m
      service: qr-detector
      severity: critical
      short: 32m
      slo: qr-detector-sla-quality
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate2h9m{check="quality",service="qr-detector",slo="qr-detector-sla-quality"}
      > (2 * (1-0.95)) and sli_checks:burnrate1d1h43m{check="quality",service="qr-detector",slo="qr-detector-sla-quality"}
      > (2 * (1-0.95))
    for: 1h4m0s
    labels:
      check: quality
      exhaustion: 15d
      long: 1d1h43m
      service: qr-detector
      severity: warning
      short: 2h9m
      slo: qr-detector-sla-quality
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate6h26m{check="quality",service="qr-detector",slo="qr-detector-sla-quality"}
      > (1 * (1-0.95)) and sli_checks:burnrate4d6h51m{check="quality",service="qr-detector",slo="qr-detector-sla-quality"}
      > (1 * (1-0.95))
    for: 3h13m0s
    labels:
      check: quality
      exhaustion: 30d
      long: 4d6h51m
      service: qr-detector
      severity: warning
      short: 6h26m
      slo: qr-detector-sla-quality
- interval: 30s
  name: qr-detector-sla-quality-generic
  rules:
  - expr: "0.95"
    labels:
      slo: qr-detector-sla-quality
    record: pyrra_objective
  - expr: "2592000"
    labels:
      slo: qr-detector-sla-quality
    record: pyrra_window
  - expr: 1 - sum(sli_errors:increase30d{check="quality",service="qr-detector",slo="qr-detector-sla-quality"}
      or vector(0)) / sum(sli_checks:increase30d{check="quality",service="qr-detector",slo="qr-detector-sla-quality"})
    labels:
      slo: qr-detector-sla-quality
    record: pyrra_availability
  - expr: sum(rate(sli_checks_total{check="quality",service="qr-detector"}[5m]))
    labels:
      slo: qr-detector-sla-quality
    record: pyrra_requests:rate5m
  - expr: sum(rate(sli_errors_total{check="quality",service="qr-detector"}[5m])) or
      vector(0)
    labels:
      slo: qr-detector-sla-quality
    record: pyrra_errors:rate5m

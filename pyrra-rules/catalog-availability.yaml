groups:
- interval: 30s
  name: catalog-availability-increase
  rules:
  - expr: sum by (status) (increase(http_requests_total{service="catalog"}[1h]))
    labels:
      service: catalog
      slo: catalog-availability
    record: http_requests:increase1h
  - alert: SLOMetricAbsent
    expr: absent(http_requests_total{service="catalog"}) == 1
    for: 0s
    labels:
      service: catalog
      severity: critical
      slo: catalog-availability
- interval: 30s
  name: catalog-availability
  rules:
  - expr: sum(rate(http_requests_total{service="catalog",status="500"}[1s])) / sum(rate(http_requests_total{service="catalog"}[1s]))
    labels:
      service: catalog
      slo: catalog-availability
    record: http_requests:burnrate0s
  - expr: sum(rate(http_requests_total{service="catalog",status="500"}[1m])) / sum(rate(http_requests_total{service="catalog"}[1m]))
    labels:
      service: catalog
      slo: catalog-availability
    record: http_requests:burnrate1m
  - expr: sum(rate(http_requests_total{service="catalog",status="500"}[2m])) / sum(rate(http_requests_total{service="catalog"}[2m]))
    labels:
      service: catalog
      slo: catalog-availability
    record: http_requests:burnrate2m
  - expr: sum(rate(http_requests_total{service="catalog",status="500"}[9m])) / sum(rate(http_requests_total{service="catalog"}[9m]))
    labels:
      service: catalog
      slo: catalog-availability
    record: http_requests:burnrate9m
  - alert: ErrorBudgetBurn
    expr: http_requests:burnrate0s{service="catalog",slo="catalog-availability"} >
      (14 * (1-0.94)) and http_requests:burnrate0s{service="catalog",slo="catalog-availability"}
      > (14 * (1-0.94))
    for: 0s
    labels:
      exhaustion: 4m17s
      long: 0s
      service: catalog
      severity: critical
      short: 0s
      slo: catalog-availability
  - alert: ErrorBudgetBurn
    expr: http_requests:burnrate0s{service="catalog",slo="catalog-availability"} >
      (7 * (1-0.94)) and http_requests:burnrate1m{service="catalog",slo="catalog-availability"}
      > (7 * (1-0.94))
    for: 0s
    labels:
      exhaustion: 8m34s
      long: 1m
      service: catalog
      severity: critical
      short: 0s
      slo: catalog-availability
  - alert: ErrorBudgetBurn
    expr: http_requests:burnrate0s{service="catalog",slo="catalog-availability"} >
      (2 * (1-0.94)) and http_requests:burnrate2m{service="catalog",slo="catalog-availability"}
      > (2 * (1-0.94))
    for: 0s
    labels:
      exhaustion: 30m
      long: 2m
      service: catalog
      severity: warning
      short: 0s
      slo: catalog-availability
  - alert: ErrorBudgetBurn
    expr: http_requests:burnrate1m{service="catalog",slo="catalog-availability"} >
      (1 * (1-0.94)) and http_requests:burnrate9m{service="catalog",slo="catalog-availability"}
      > (1 * (1-0.94))
    for: 0s
    labels:
      exhaustion: 1h
      long: 9m
      service: catalog
      severity: warning
      short: 1m
      slo: catalog-availability
- interval: 30s
  name: catalog-availability-generic
  rules:
  - expr: "0.94"
    labels:
      slo: catalog-availability
    record: pyrra_objective
  - expr: "3600"
    labels:
      slo: catalog-availability
    record: pyrra_window
  - expr: 1 - sum(http_requests:increase1h{service="catalog",slo="catalog-availability",status="500"}
      or vector(0)) / sum(http_requests:increase1h{service="catalog",slo="catalog-availability"})
    labels:
      slo: catalog-availability
    record: pyrra_availability
  - expr: sum(rate(http_requests_total{service="catalog"}[5m]))
    labels:
      slo: catalog-availability
    record: pyrra_requests:rate5m
  - expr: sum(rate(http_requests_total{service="catalog",status="500"}[5m])) or vector(0)
    labels:
      slo: catalog-availability
    record: pyrra_errors:rate5m

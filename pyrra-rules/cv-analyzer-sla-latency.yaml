groups:
- interval: 2m30s
  name: cv-analyzer-sla-latency-increase
  rules:
  - expr: sum(increase(sli_checks_total{check="latency",service="cv-analyzer"}[30d]))
    labels:
      check: latency
      service: cv-analyzer
      slo: cv-analyzer-sla-latency
    record: sli_checks:increase30d
  - alert: SLOMetricAbsent
    expr: absent(sli_checks_total{check="latency",service="cv-analyzer"}) == 1
    for: 47m
    labels:
      check: latency
      service: cv-analyzer
      severity: critical
      slo: cv-analyzer-sla-latency
  - expr: sum(increase(sli_errors_total{check="latency",service="cv-analyzer"}[30d]))
    labels:
      check: latency
      service: cv-analyzer
      slo: cv-analyzer-sla-latency
    record: sli_errors:increase30d
  - alert: SLOMetricAbsent
    expr: absent(sli_errors_total{check="latency",service="cv-analyzer"}) == 1
    for: 47m
    labels:
      check: latency
      service: cv-analyzer
      severity: critical
      slo: cv-analyzer-sla-latency
- interval: 30s
  name: cv-analyzer-sla-latency
  rules:
  - expr: sum(rate(sli_errors_total{check="latency",service="cv-analyzer"}[5m])) /
      sum(rate(sli_checks_total{check="latency",service="cv-analyzer"}[5m]))
    labels:
      check: latency
      service: cv-analyzer
      slo: cv-analyzer-sla-latency
    record: sli_checks:burnrate5m
  - expr: sum(rate(sli_errors_total{check="latency",service="cv-analyzer"}[32m]))
      / sum(rate(sli_checks_total{check="latency",service="cv-analyzer"}[32m]))
    labels:
      check: latency
      service: cv-analyzer
      slo: cv-analyzer-sla-latency
    record: sli_checks:burnrate32m
  - expr: sum(rate(sli_errors_total{check="latency",service="cv-analyzer"}[1h4m]))
      / sum(rate(sli_checks_total{check="latency",service="cv-analyzer"}[1h4m]))
    labels:
      check: latency
      service: cv-analyzer
      slo: cv-analyzer-sla-latency
    record: sli_checks:burnrate1h4m
  - expr: sum(rate(sli_errors_total{check="latency",service="cv-analyzer"}[2h9m]))
      / sum(rate(sli_checks_total{check="latency",service="cv-analyzer"}[2h9m]))
    labels:
      check: latency
      service: cv-analyzer
      slo: cv-analyzer-sla-latency
    record: sli_checks:burnrate2h9m
  - expr: sum(rate(sli_errors_total{check="latency",service="cv-analyzer"}[6h26m]))
      / sum(rate(sli_checks_total{check="latency",service="cv-analyzer"}[6h26m]))
    labels:
      check: latency
      service: cv-analyzer
      slo: cv-analyzer-sla-latency
    record: sli_checks:burnrate6h26m
  - expr: sum(rate(sli_errors_total{check="latency",service="cv-analyzer"}[1d1h43m]))
      / sum(rate(sli_checks_total{check="latency",service="cv-analyzer"}[1d1h43m]))
    labels:
      check: latency
      service: cv-analyzer
      slo: cv-analyzer-sla-latency
    record: sli_checks:burnrate1d1h43m
  - expr: sum(rate(sli_errors_total{check="latency",service="cv-analyzer"}[4d6h51m]))
      / sum(rate(sli_checks_total{check="latency",service="cv-analyzer"}[4d6h51m]))
    labels:
      check: latency
      service: cv-analyzer
      slo: cv-analyzer-sla-latency
    record: sli_checks:burnrate4d6h51m
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate5m{check="latency",service="cv-analyzer",slo="cv-analyzer-sla-latency"}
      > (14 * (1-0.95)) and sli_checks:burnrate1h4m{check="latency",service="cv-analyzer",slo="cv-analyzer-sla-latency"}
      > (14 * (1-0.95))
    for: 2m0s
    labels:
      check: latency
      exhaustion: 2d3h25m42s
      long: 1h4m
      service: cv-analyzer
      severity: critical
      short: 5m
      slo: cv-analyzer-sla-latency
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate32m{check="latency",service="cv-analyzer",slo="cv-analyzer-sla-latency"}
      > (7 * (1-0.95)) and sli_checks:burnrate6h26m{check="latency",service="cv-analyzer",slo="cv-analyzer-sla-latency"}
      > (7 * (1-0.95))
    for: 16m0s
    labels:
      check: latency
      exhaustion: 4d6h51m25s
      long: 6h26m
      service: cv-analyzer
      severity: critical
      short: 32m
      slo: cv-analyzer-sla-latency
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate2h9m{check="latency",service="cv-analyzer",slo="cv-analyzer-sla-latency"}
      > (2 * (1-0.95)) and sli_checks:burnrate1d1h43m{check="latency",service="cv-analyzer",slo="cv-analyzer-sla-latency"}
      > (2 * (1-0.95))
    for: 1h4m0s
    labels:
      check: latency
      exhaustion: 15d
      long: 1d1h43m
      service: cv-analyzer
      severity: warning
      short: 2h9m
      slo: cv-analyzer-sla-latency
  - alert: ErrorBudgetBurn
    expr: sli_checks:burnrate6h26m{check="latency",service="cv-analyzer",slo="cv-analyzer-sla-latency"}
      > (1 * (1-0.95)) and sli_checks:burnrate4d6h51m{check="latency",service="cv-analyzer",slo="cv-analyzer-sla-latency"}
      > (1 * (1-0.95))
    for: 3h13m0s
    labels:
      check: latency
      exhaustion: 30d
      long: 4d6h51m
      service: cv-analyzer
      severity: warning
      short: 6h26m
      slo: cv-analyzer-sla-latency
- interval: 30s
  name: cv-analyzer-sla-latency-generic
  rules:
  - expr: "0.95"
    labels:
      slo: cv-analyzer-sla-latency
    record: pyrra_objective
  - expr: "2592000"
    labels:
      slo: cv-analyzer-sla-latency
    record: pyrra_window
  - expr: 1 - sum(sli_errors:increase30d{check="latency",service="cv-analyzer",slo="cv-analyzer-sla-latency"}
      or vector(0)) / sum(sli_checks:increase30d{check="latency",service="cv-analyzer",slo="cv-analyzer-sla-latency"})
    labels:
      slo: cv-analyzer-sla-latency
    record: pyrra_availability
  - expr: sum(rate(sli_checks_total{check="latency",service="cv-analyzer"}[5m]))
    labels:
      slo: cv-analyzer-sla-latency
    record: pyrra_requests:rate5m
  - expr: sum(rate(sli_errors_total{check="latency",service="cv-analyzer"}[5m])) or
      vector(0)
    labels:
      slo: cv-analyzer-sla-latency
    record: pyrra_errors:rate5m

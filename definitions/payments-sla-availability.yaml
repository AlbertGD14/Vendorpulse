apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: payments-sla-availability
  labels:
    service: payments
    type: sla
spec:
  description: "SLA de disponibilidad mensual de la pasarela de pagos"
  target: "99.5"
  window: 30d
  indicator:
    ratio:
      errors:
        metric: http_requests_total{service="payments", status="500"}
      total:
        metric: http_requests_total{service="payments"}

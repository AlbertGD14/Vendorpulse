apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: qr-detector-real-latency
  labels:
    service: qr-detector-real
  annotations:
    bridge.real: "true"
    bridge.prometheus_url: "http://host.docker.internal:9090"
    bridge.query: 'avg_p_latency{service_type="elastic-workbench-qr-detector"}'
    bridge.threshold: "27.0"
    bridge.condition: "<="
spec:
  description: "latency de qr-detector-real: 99% en ventana 1h"
  target: "99"
  window: 1h
  indicator:
    ratio:
      errors:
        metric: sli_errors_total{service="qr-detector-real", check="latency"}
      total:
        metric: sli_checks_total{service="qr-detector-real", check="latency"}

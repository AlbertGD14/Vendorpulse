apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: catalog-critical-window
  labels:
    service: catalog
spec:
  description: "Ventana crítica del catálogo: mínimo de errores en últimos 5 minutos"
  target: "92"
  window: 5m
  indicator:
    ratio:
      errors:
        metric: http_requests_total{service="catalog", status="500"}
      total:
        metric: http_requests_total{service="catalog"}
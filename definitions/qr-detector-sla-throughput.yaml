apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: qr-detector-sla-throughput
  labels:
    service: qr-detector
    type: sla
spec:
  description: "SLA mensual de throughput del QR detector: >= 5 fps el 95% del tiempo"
  target: "95"
  window: 30d
  indicator:
    ratio:
      errors:
        metric: sli_errors_total{service="qr-detector", check="throughput"}
      total:
        metric: sli_checks_total{service="qr-detector", check="throughput"}

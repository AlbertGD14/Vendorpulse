apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: catalog-sla-critical
  labels:
    service: catalog
    type: sla
spec:
  description: "SLA crítico mensual del catálogo de productos"
  target: "88"
  window: 30d
  indicator:
    ratio:
      errors:
        metric: http_requests_total{service="catalog", status="500"}
      total:
        metric: http_requests_total{service="catalog"}

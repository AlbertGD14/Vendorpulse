apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: qr-detector-sla-latency
  labels:
    service: qr-detector
spec:
  description: "latency de qr-detector: 95% en ventana 30d"
  target: "95"
  window: 30d
  indicator:
    ratio:
      errors:
        metric: sli_errors_total{service="qr-detector", check="latency"}
      total:
        metric: sli_checks_total{service="qr-detector", check="latency"}

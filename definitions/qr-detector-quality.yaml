apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: qr-detector-quality
  labels:
    service: qr-detector
spec:
  description: "Calidad del QR detector: data_quality >= 800 el 99% del tiempo"
  target: "99"
  window: 1h
  indicator:
    ratio:
      errors:
        metric: sli_errors_total{service="qr-detector", check="quality"}
      total:
        metric: sli_checks_total{service="qr-detector", check="quality"}
